[project]
site_name = "OO-LD Schema"
repo_url = "https://github.com/OO-LD/oold-schema"
site_url = "https://OO-LD.github.io/oold-schema/"
site_description = "Object-Oriented Linked Data Schema - JSON Schema + JSON-LD in one document"
site_author = "OO-LD Contributors"
edit_uri = "edit/main/docs/"
repo_name = "OO-LD/oold-schema"
copyright = 'Maintained by <a href="https://github.com/OO-LD">OO-LD</a>.'

extra_css = ["stylesheets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Introduction" = "introduction.md" },
    { "Get Started" = "get-started.md" },
    { "Guide" = [
        { "Overview" = "guide/index.md" },
        { "Basic Concepts" = "guide/basic-concepts.md" },
        { "Composition" = "guide/composition.md" },
        { "Schema Instances" = "guide/schema-instances.md" },
        { "Identification & Versioning" = "guide/identification-versioning.md" },
        { "Extensions" = "guide/extensions.md" },
        { "Meta-schema & Vocabulary" = "guide/meta-schema.md" },
    ]},
    { "Use Cases" = "use-cases.md" },
    { "Mappings" = "mappings.md" },
    { "Tooling" = "tooling.md" },
    { "Reference" = "reference.md" },
    { "Specification" = "spec/index.html" },
]

[project.theme]
language = "en"
# Logo/favicon are a local copy of the repository's OO-LD_logo.jpg so the build
# is self-contained (see docs/assets/).
logo = "assets/OO-LD_logo.jpg"
favicon = "assets/OO-LD_logo.jpg"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.tabs",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
previous = "fontawesome/solid/angle-left"
next = "fontawesome/solid/angle-right"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "deep orange"
toggle.icon =  "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "deep orange"
toggle.icon =  "material/brightness-4"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/OO-LD/oold-schema"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

# Enables `--8<-- "path"` includes so example files (e.g. examples/*.schema.json)
# are a single source shared between the guide and the generated spec.
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.toc]
permalink = true
